<!-- MINIMAL LIVE UPDATE -->

<div class="nx-update-overlay" id="nxUpdate">

    <div class="nx-card">

        <div class="nx-status">
            <div class="nx-dot"></div>
            <span>System Online</span>
        </div>

        <h1>Nexora is back</h1>

        <p class="nx-subtitle">
            Maintenance completed successfully.
            Everything is running smoothly again.
        </p>

        <div class="nx-divider"></div>

        <div class="nx-changes">

            <div class="nx-item">
                <span>Fixed login issue</span>
            </div>

            <div class="nx-item">
                <span>Security tightened</span>
            </div>

            <div class="nx-item">
                <span></span>
            </div>
   <div class="nx-item">
                <span>Edu-os is now Nexora</span>
            </div>
            
            <div class="nx-item">
                <span>More updates coming tomorrow</span>
            </div>

        </div>

        <button onclick="closeNexoraUpdate()" class="nx-btn">
            Continue
        </button>

    </div>

</div>

<style>

.nx-update-overlay{
    position:fixed;
    inset:0;
    z-index:999999;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:24px;

    background:#070b17;

    font-family:Inter, sans-serif;
}

.nx-card{
    width:100%;
    max-width:380px;

    background:#0d1324;

    border:1px solid rgba(255,255,255,0.06);

    border-radius:28px;

    padding:28px 24px;

    color:white;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.45);
}

.nx-status{
    display:flex;
    align-items:center;
    gap:10px;

    font-size:13px;
    color:#8ef7b2;

    margin-bottom:22px;
}

.nx-dot{
    width:10px;
    height:10px;

    border-radius:50%;

    background:#39ff88;

    box-shadow:0 0 10px #39ff88;
}

.nx-card h1{
    font-size:32px;
    font-weight:700;

    margin-bottom:12px;

    letter-spacing:-1px;
}

.nx-subtitle{
    color:#8d96ad;

    font-size:14px;

    line-height:1.7;

    margin-bottom:24px;
}

.nx-divider{
    width:100%;
    height:1px;

    background:rgba(255,255,255,0.06);

    margin-bottom:10px;
}

.nx-changes{
    display:flex;
    flex-direction:column;
}

.nx-item{
    padding:16px 0;

    border-bottom:1px solid rgba(255,255,255,0.05);

    font-size:14px;

    color:#edf2ff;
}

.nx-item:last-child{
    border-bottom:none;
}

.nx-btn{
    width:100%;

    height:54px;

    margin-top:28px;

    border:none;

    border-radius:16px;

    background:white;

    color:#050816;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:0.2s ease;
}

.nx-btn:active{
    transform:scale(0.98);
}

</style>

<script>

function closeNexoraUpdate(){
    document.getElementById("nxUpdate").style.display = "none";
}

</script>
